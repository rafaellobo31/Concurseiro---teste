
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concurseiro Pro</title>
    
    <!-- Shim Crítico para evitar erro de 'process is not defined' -->
    <script>
      window.process = window.process || { env: {} };
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var message = [
          'Message: ' + msg,
          'URL: ' + url,
          'Line: ' + lineNo,
          'Column: ' + columnNo,
          'Error object: ' + JSON.stringify(error)
        ].join(' - ');
        console.error(message);
        // Opcional: alert(message); // Descomente para debug agressivo em mobile/produção
        return false;
      };
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .exam-font {
            font-family: 'Merriweather', serif;
        }
    </style>

<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root">
        <div style="display: flex; min-height: 100vh; align-items: center; justify-content: center; background-color: #f8fafc; font-family: sans-serif;">
            <div style="text-align: center;">
                <div style="width: 48px; height: 48px; border: 4px solid #e2e8f0; border-top: 4px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px;"></div>
                <p style="color: #64748b; font-weight: bold; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;">Carregando Concurseiro Pro...</p>
            </div>
        </div>
    </div>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script type="module" src="/src/index.tsx"></script>
</body>
</html>
